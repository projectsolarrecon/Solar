name: Create Weekly Blog Issue

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 5"

permissions:
  issues: write

jobs:
  create_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create weekly blog issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `[Weekly Blog]: ${today}`;
            const body = `
            ## Purpose

            This issue was created automatically for this week's core SOLAR blog post.

            Target cadence:
            - publish at least **one** blog post this weekend
            - optional second post only if there is a strong angle or easy win

            ## Use this structure

            Use the **Weekly Blog Post** issue form structure when filling this out.

            ## SOLAR editorial checklist

            - Choose one clear angle
            - Use authoritative sources where possible
            - Link to existing SOLAR pages or guides where relevant
            - Keep the tone evidence-based, sharp, and readable
            - Prioritize one strong post over two weaker ones

            ## Publishing path reminder

            Current canonical blog workflow:
            1. Create/update the page file in \`src/pages/blog/\`
            2. Add the route in \`src/App.tsx\`
            3. Add the metadata entry at the top of \`src/data/blogPosts.ts\`

            ## Suggested content buckets

            - Accountability / hypocrisy / authority abuse
            - Registry policy / reform
            - Reentry / collateral consequences
            - Current event commentary
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });