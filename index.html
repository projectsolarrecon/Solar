<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/solar-favicon.png" />
    <link rel="shortcut icon" href="/solar-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The SOLAR Project</title>
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T257LDLPRB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      
      gtag('config', 'G-T257LDLPRB', {
        // Enhanced measurement for better tracking
        send_page_view: true,
        // Track file downloads, outbound clicks, site search, video engagement
        enhanced_measurement: {
          scrolls: true,
          outbound_clicks: true,
          site_search: true,
          video_engagement: true,
          file_downloads: true
        }
      });
    </script>
  </head>
  <body>
    <!-- Netlify scans static HTML at deploy time to register React-rendered forms. -->
    <form name="solar-contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="inquiryType">
        <option value="general">General Information</option>
      </select>
      <textarea name="message"></textarea>
      <input type="checkbox" name="privacyAgreement" />
      <input type="text" name="bot-field" />
    </form>

    <form name="solar-resource-request" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="resourceType" />
      <textarea name="details"></textarea>
      <input type="email" name="email" />
      <input type="text" name="bot-field" />
    </form>

    <form name="solar-newsletter" netlify netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input type="text" name="source" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (() => {
        const encode = (data) => new URLSearchParams(data).toString();

        const submitToNetlify = async (formName, data) => {
          const response = await fetch('/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: encode({ 'form-name': formName, ...data }),
          });

          if (!response.ok) {
            throw new Error(`Netlify form submission failed: ${response.status}`);
          }
        };

        document.addEventListener('submit', async (event) => {
          const form = event.target;
          if (!(form instanceof HTMLFormElement) || form.getAttribute('name') === 'solar-contact') return;

          const section = form.closest('section');
          const heading = section?.querySelector('h2')?.textContent?.trim();
          if (heading !== "Can't Find What You Need?") return;

          event.preventDefault();
          const inputs = form.querySelectorAll('input');
          const resourceType = inputs[0]?.value?.trim() || '';
          const email = inputs[1]?.value?.trim() || '';
          const details = form.querySelector('textarea')?.value?.trim() || '';
          const button = form.querySelector('button[type="submit"]');

          if (!resourceType) {
            alert('Please tell us what type of resource you are looking for.');
            return;
          }

          if (button) button.disabled = true;
          try {
            await submitToNetlify('solar-resource-request', { resourceType, details, email });
            form.reset();
            alert('Your resource request has been submitted.');
          } catch (error) {
            console.error(error);
            alert('We could not submit your request. Please try again.');
          } finally {
            if (button) button.disabled = false;
          }
        });

        document.addEventListener('click', async (event) => {
          const target = event.target;
          if (!(target instanceof Element)) return;
          const button = target.closest('button');
          if (!button || button.textContent?.trim() !== 'Subscribe') return;

          const section = button.closest('section');
          const emailInput = section?.querySelector('input[type="email"]');
          if (!(emailInput instanceof HTMLInputElement)) return;

          event.preventDefault();
          const email = emailInput.value.trim();
          if (!email || !emailInput.checkValidity()) {
            emailInput.reportValidity();
            return;
          }

          const source = window.location.pathname === '/blog' ? 'Blog page' : 'Resources page';
          button.disabled = true;
          try {
            await submitToNetlify('solar-newsletter', { email, source });
            emailInput.value = '';
            alert('Thank you. Your email has been submitted.');
          } catch (error) {
            console.error(error);
            alert('We could not submit your email. Please try again.');
          } finally {
            button.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
