<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/solar-favicon.png" />
    <link rel="shortcut icon" href="/solar-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The SOLAR Project</title>
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T257LDLPRB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      
      gtag('config', 'G-T257LDLPRB', {
        // Enhanced measurement for better tracking
        send_page_view: true,
        // Track file downloads, outbound clicks, site search, video engagement
        enhanced_measurement: {
          scrolls: true,
          outbound_clicks: true,
          site_search: true,
          video_engagement: true,
          file_downloads: true
        }
      });
    </script>
  </head>
  <body>
    <!-- Netlify scans static HTML at deploy time to register this React-rendered form. -->
    <form name="solar-contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="inquiryType">
        <option value="general">General Information</option>
      </select>
      <textarea name="message"></textarea>
      <input type="checkbox" name="privacyAgreement" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
